<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Calculator</title>

  <style>
    body {
      background: #1e1e2f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      color: white;
    }

    .calculator {
      background: #2c2c3e;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      width: 260px;
    }

    #display {
      width: 100%;
      height: 50px;
      font-size: 22px;
      margin-bottom: 15px;
      text-align: right;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1e1e2f;
      color: white;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }

    button {
      height: 50px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(145deg, #3a3a5c, #4a4a7a);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #5757a8;
    }

    button:active {
      transform: scale(0.9);
    }

    .equal { background: #667eea; }
    .clear { background: #e53e3e; }
    .delete { background: #f59e0b; }
    .history-clear { background: #dc2626; margin-top:10px; width:100%; }

    #historyList {
      margin-top: 10px;
      max-height: 120px;
      overflow-y: auto;
      padding: 0;
    }

    #historyList li {
      list-style: none;
      background: #444;
      margin: 5px 0;
      padding: 6px;
      border-radius: 5px;
      font-size: 14px;
    }

    h3 { margin-top: 15px; font-size: 16px; }
  </style>

</head>
<body>

  <div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
      <button onclick="clearDisplay()" class="clear">C</button>
      <button onclick="deleteLast()" class="delete">⌫</button>
      <button onclick="append('/')">/</button>
      <button onclick="append('*')">*</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('-')">-</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('+')">+</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="calculate()" class="equal">=</button>

      <button onclick="append('0')">0</button>
    </div>

    <h3>History 📜</h3>
    <ul id="historyList"></ul>

    <button onclick="clearHistory()" class="history-clear">Clear History 🗑️</button>
  </div>

  <!-- Sound -->
  <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

  <script>
    let history = [];

    function playSound() {
      document.getElementById("clickSound").play();
    }

    function append(value) {
      playSound();
      document.getElementById("display").value += value;
    }

    function clearDisplay() {
      playSound();
      document.getElementById("display").value = "";
    }

    function deleteLast() {
      playSound();
      let current = document.getElementById("display").value;
      document.getElementById("display").value = current.slice(0, -1);
    }

    function calculate() {
      playSound();
      let expression = document.getElementById("display").value;

      try {
        let result = eval(expression);
        history.push(expression + " = " + result);
        document.getElementById("display").value = result;
        showHistory();
      } catch {
        document.getElementById("display").value = "Error ❌";
      }
    }

    function showHistory() {
      let list = document.getElementById("historyList");
      list.innerHTML = "";

      for (let i = 0; i < history.length; i++) {
        let li = document.createElement("li");
        li.innerText = history[i];
        list.appendChild(li);
      }
    }

    function clearHistory() {
      history = [];
      showHistory();
    }

    // ⌨️ Keyboard support
    document.addEventListener("keydown", function(event) {
      let key = event.key;

      if (!isNaN(key) || ["+", "-", "*", "/"].includes(key)) {
        append(key);
      } else if (key === "Enter") {
        calculate();
      } else if (key === "Backspace") {
        deleteLast();
      } else if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
